        if (await saveRecord(record, bundle)) setForm(defaultRecord());
      });
      $("resetBtn").addEventListener("click", () => setForm(defaultRecord()));
      $("proofPreview").addEventListener("click", async (event) => {
        const button = event.target.closest("[data-proof-remove]");
        if (!button) return;
        await removeFormProof(button.dataset.proofRemove);
      });
      $("proof").addEventListener("change", async (event) => {
        const images = [];
        for (const file of Array.from(event.target.files || []).filter((item) => item.type.startsWith("image/"))) {
          images.push(await fileToImageData(file));
        }
        state.proofDraft.push(...images);
        renderProofPreview(getRecordImages($("recordId").value));
        updateLiveClassify();
      });
      $("extractImages").addEventListener("change", async (event) => {
        try {
          await prepareExtractImages(event.target.files);
          $("extractStatus").textContent = `${state.aiImages.length}枚を選択しました`;
        } catch (error) {
          $("extractStatus").textContent = error.message;
        }
      });
      ["extractThumbs", "extractText"].forEach((id) => {
        $(id).addEventListener("dragover", (event) => event.preventDefault());
        $(id).addEventListener("drop", async (event) => {
          event.preventDefault();
          try {
            await prepareExtractImages(event.dataTransfer.files);
            $("extractStatus").textContent = `${state.aiImages.length}枚を選択しました`;
          } catch (error) {
            $("extractStatus").textContent = error.message;
          }
        });
      });
      $("extractThumbs").addEventListener("click", (event) => {
        const button = event.target.closest("[data-extract-image-delete]");
        if (!button) return;
        const index = Number(button.dataset.extractImageDelete);
        state.aiImages.splice(index, 1);
        state.aiItems.forEach((record) => {
          if (record.imageIndex === index) record.imageIndex = state.aiImages.length ? 0 : -1;
          if (record.imageIndex > index) record.imageIndex -= 1;
        });
        renderExtractThumbs();
        renderReview();
      });
      $("runExtractBtn").addEventListener("click", async () => {
        try {
          await runExtract();
        } catch (error) {
          $("extractStatus").textContent = error.message;
        }
      });
      $("clearExtractBtn").addEventListener("click", clearExtract);
      $("addExtractedBtn").addEventListener("click", async () => {
        try {
          await addExtracted();
        } catch (error) {
          $("extractStatus").textContent = error.message;
        }
      });
      $("reviewRows").addEventListener("input", (event) => {
        const target = event.target.closest("[data-review]");
        if (!target) return;
        const index = Number(target.dataset.review);
        const field = target.dataset.field;
        state.aiItems[index][field] = ["amount", "qty", "rate"].includes(field) ? Number(target.value || 0) : target.value;
      });
      $("reviewRows").addEventListener("change", (event) => {
        const target = event.target.closest("[data-review]");
        if (!target) return;
        const index = Number(target.dataset.review);
        const field = target.dataset.field;
        state.aiItems[index][field] = ["amount", "qty", "rate"].includes(field) ? Number(target.value || 0) : target.value;
        renderReview();
      });
      $("reviewRows").addEventListener("click", (event) => {
        const applyButton = event.target.closest("[data-review-apply]");
        if (applyButton) {
          applyExtractedToForm(Number(applyButton.dataset.reviewApply));
          return;
        }
        const button = event.target.closest("[data-review-delete]");
        if (!button) return;
        state.aiItems.splice(Number(button.dataset.reviewDelete), 1);
        renderReview();
      });
      $("recordRows").addEventListener("click", async (event) => {
        const evidenceId = event.target.closest("[data-evidence]")?.dataset.evidence;
        const editId = event.target.closest("[data-edit]")?.dataset.edit;
        const deleteId = event.target.closest("[data-delete]")?.dataset.delete;
        if (evidenceId) openEvidence(evidenceId);
        if (editId) {
          const record = state.records.find((item) => item.id === editId);
          if (record) setForm(record);
        }
        if (deleteId && confirm("削除しますか？")) {
          await deleteRecord(deleteId);
        }
      });
      ["filterStaff", "filterChannel", "filterBranch", "filterKind"].forEach((id) => {
        $(id).addEventListener("change", () => {
          const key = id.replace("filter", "").toLowerCase();
          state.filters[key] = $(id).value;
          render();
        });
      });
      $("filterText").addEventListener("input", () => {
        state.filters.text = $("filterText").value;
        render();
      });
      $("sortOrder").addEventListener("change", () => {
        state.sortOrder = $("sortOrder").value;
        render();
      });
      $("exportListBtn").addEventListener("click", () => downloadCsv(exportRows(currentExportRecords(), "list"), "仕入一覧.csv"));
      $("exportBookBtn").addEventListener("click", () => downloadCsv(exportRows(currentExportRecords(), "book"), "古物商特例帳簿.csv"));
      $("exportIndexBtn").addEventListener("click", () => downloadCsv(exportRows(currentExportRecords(), "index"), "電帳法索引簿.csv"));
      $("exportExcelBtn").addEventListener("click", exportExcel);
      $("printPdfBtn").addEventListener("click", printPdf);
      $("exportEvidenceBtn").addEventListener("click", downloadAllEvidence);
      $("taxPackageBtn").addEventListener("click", downloadTaxPackage);
      $("taxPackageHistory").addEventListener("click", async (event) => {
        const deleteButton = event.target.closest("[data-tax-package-delete]");
        if (deleteButton) {
          if (!confirm("保存済みの税理士提出ZIPを削除しますか？")) return;
          try {
            await deleteSavedTaxPackage(deleteButton.dataset.taxPackageDelete);
          } catch (error) {
            console.error("[TaxPackage] Saved package delete failed", error);
            $("ioStatus").textContent = `Saved tax package delete failed: ${formatErrorDetails(error)}`;
          }
          return;
        }
        const button = event.target.closest("[data-tax-package-download]");
        if (!button) return;
        try {
          await downloadSavedTaxPackage(button.dataset.taxPackageDownload);
        } catch (error) {
          console.error("[TaxPackage] Saved package download failed", error);
          $("ioStatus").textContent = `Saved tax package download failed: ${error && error.message ? error.message : "unknown error"}`;
        }
      });
      $("backupBtn").addEventListener("click", exportBackup);
      $("downloadTemplateBtn").addEventListener("click", () => downloadCsv(exportRows([], "list"), "仕入一覧テンプレート.csv"));
      $("importFile").addEventListener("change", async (event) => {
        try {
          await importCsv(event.target.files[0]);
          await loadAll();
        } catch (error) {
          $("ioStatus").textContent = error.message;
        } finally {
          event.target.value = "";
          $("importEvidenceFiles").value = "";
        }
      });
      $("restoreFile").addEventListener("change", async (event) => {
        try {
          await restoreBackup(event.target.files[0]);
        } catch (error) {
          $("ioStatus").textContent = error.message;
        } finally {
          event.target.value = "";
        }
      });
      $("migrateLocalBtn").addEventListener("click", async () => {
        try {
          await migrateLocalPurchases();
        } catch (error) {
          console.error("[Migration] local purchase migration failed", error);
          $("ioStatus").textContent = `Supabase migration failed: ${error && error.message ? error.message : "unknown error"}`;
        }
      });
      $("closeEvidenceBtn").addEventListener("click", () => $("evidenceDialog").close());
      $("downloadEvidenceBtn").addEventListener("click", downloadEvidence);
      $("prevEvidenceBtn").addEventListener("click", () => {
        const count = getRecordImages(state.currentEvidenceId).length;
        if (!count) return;
        state.currentEvidenceIndex = (state.currentEvidenceIndex + count - 1) % count;
        renderEvidenceDialog();
      });
      $("nextEvidenceBtn").addEventListener("click", () => {
        const count = getRecordImages(state.currentEvidenceId).length;
        if (!count) return;
        state.currentEvidenceIndex = (state.currentEvidenceIndex + 1) % count;
        renderEvidenceDialog();
      });
      $("evidenceThumbs").addEventListener("click", (event) => {
        const button = event.target.closest("[data-evidence-index]");
        if (!button) return;
        state.currentEvidenceIndex = Number(button.dataset.evidenceIndex);
        renderEvidenceDialog();
      });
      $("sampleBtn").addEventListener("click", async () => {
        await addSampleRecords();
      });
      $("clearBtn").addEventListener("click", async () => {
        if (!confirm("すべて削除しますか？")) return;
        for (const record of [...state.records]) await deleteRecord(record.id);
        setForm(defaultRecord());
      });
    }

    async function initApp() {
      await loadSettings();
      await loadMeta();
      initMeta();
      bindEvents();
      renderSettingsForm();
      setForm(defaultRecord());
      if (!await refreshAuthState()) return;
      await loadAll();
      if (syncEnabled()) {
        try {
          await pullCloud();
        } catch (error) {
          $("ioStatus").textContent = error.message;
        }
      }
    }

    initApp();
  </script>
</body>
</html>
